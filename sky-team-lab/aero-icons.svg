<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360"
     fill="none" stroke="currentColor" stroke-width="3"
     stroke-linecap="round" stroke-linejoin="round"
     font-family="system-ui, -apple-system, sans-serif" color="#0f172a">

  <style>
    .cell-frame { fill: rgba(15, 23, 42, 0.04); stroke: rgba(15, 23, 42, 0.18); stroke-width: 0.75; }
    .label { fill: rgba(15, 23, 42, 0.65); stroke: none; font-size: 8.5px; text-anchor: middle; font-weight: 500; }
    .accent { fill: currentColor; stroke: none; }
  </style>

  <!-- ============ Row 1 ============ -->

  <!-- 1. Radio Tower -->
  <rect class="cell-frame" x="0" y="0" width="80" height="90" rx="6" />
  <g id="radio-tower" transform="translate(8, 6)">
    <path d="M 14 24 Q 32 8 50 24" />
    <path d="M 8 32 Q 32 4 56 32" />
    <circle class="accent" cx="32" cy="20" r="2.5" />
    <line x1="32" y1="22" x2="32" y2="30" />
    <line x1="32" y1="30" x2="20" y2="58" />
    <line x1="32" y1="30" x2="44" y2="58" />
    <line x1="26" y1="42" x2="38" y2="42" />
    <line x1="23" y1="52" x2="41" y2="52" />
    <line x1="26" y1="42" x2="38" y2="52" />
    <line x1="38" y1="42" x2="26" y2="52" />
  </g>
  <text class="label" x="40" y="84">Radio Tower</text>

  <!-- 2. Headset -->
  <rect class="cell-frame" x="80" y="0" width="80" height="90" rx="6" />
  <g id="headset" transform="translate(88, 6)">
    <path d="M 12 36 Q 12 12 32 12 Q 52 12 52 36" />
    <rect class="accent" x="8" y="32" width="10" height="18" rx="3" />
    <rect class="accent" x="46" y="32" width="10" height="18" rx="3" />
    <path d="M 51 49 Q 51 56 44 56 L 36 56" />
    <circle class="accent" cx="34" cy="56" r="3" />
  </g>
  <text class="label" x="120" y="84">Headset</text>

  <!-- 3. Compass -->
  <rect class="cell-frame" x="160" y="0" width="80" height="90" rx="6" />
  <g id="compass" transform="translate(168, 6)">
    <circle cx="32" cy="32" r="22" />
    <line x1="32" y1="6" x2="32" y2="11" />
    <line x1="32" y1="53" x2="32" y2="58" />
    <line x1="6" y1="32" x2="11" y2="32" />
    <line x1="53" y1="32" x2="58" y2="32" />
    <polygon class="accent" points="32,14 28,32 32,30 36,32" />
    <polygon points="32,50 28,32 32,34 36,32" stroke-width="2" />
  </g>
  <text class="label" x="200" y="84">Compass</text>

  <!-- 4. Altimeter (round dial) -->
  <rect class="cell-frame" x="240" y="0" width="80" height="90" rx="6" />
  <g id="altimeter" transform="translate(248, 6)">
    <circle cx="32" cy="32" r="24" />
    <line x1="32" y1="11" x2="32" y2="15" />
    <line x1="32" y1="49" x2="32" y2="53" />
    <line x1="11" y1="32" x2="15" y2="32" />
    <line x1="49" y1="32" x2="53" y2="32" />
    <line x1="17" y1="17" x2="20" y2="20" stroke-width="2" />
    <line x1="47" y1="17" x2="44" y2="20" stroke-width="2" />
    <line x1="17" y1="47" x2="20" y2="44" stroke-width="2" />
    <line x1="47" y1="47" x2="44" y2="44" stroke-width="2" />
    <line x1="32" y1="32" x2="44" y2="20" />
    <line x1="32" y1="32" x2="32" y2="42" stroke-width="2" />
    <circle class="accent" cx="32" cy="32" r="2.5" />
  </g>
  <text class="label" x="280" y="84">Altimeter</text>

  <!-- 5. Speedometer (half dial) -->
  <rect class="cell-frame" x="320" y="0" width="80" height="90" rx="6" />
  <g id="speedometer" transform="translate(328, 6)">
    <path d="M 8 42 A 24 24 0 0 1 56 42" />
    <line x1="11" y1="38" x2="14" y2="38" stroke-width="2" />
    <line x1="20" y1="22" x2="22" y2="25" stroke-width="2" />
    <line x1="32" y1="14" x2="32" y2="17" stroke-width="2" />
    <line x1="44" y1="22" x2="42" y2="25" stroke-width="2" />
    <line x1="53" y1="38" x2="50" y2="38" stroke-width="2" />
    <line x1="32" y1="42" x2="46" y2="24" />
    <circle class="accent" cx="32" cy="42" r="2.5" />
  </g>
  <text class="label" x="360" y="84">Speedometer</text>

  <!-- ============ Row 2 ============ -->

  <!-- 6. Plane (Top View) -->
  <rect class="cell-frame" x="0" y="90" width="80" height="90" rx="6" />
  <g id="plane-top" transform="translate(8, 96)">
    <path class="accent" d="M 32 6 Q 35 7 35 26 L 56 30 L 56 36 L 35 34 L 35 48 L 42 53 L 42 56 L 32 52 L 22 56 L 22 53 L 29 48 L 29 34 L 8 36 L 8 30 L 29 26 Q 29 7 32 6 Z" />
  </g>
  <text class="label" x="40" y="174">Plane (Top)</text>

  <!-- 7. Plane (Front View) -->
  <rect class="cell-frame" x="80" y="90" width="80" height="90" rx="6" />
  <g id="plane-front" transform="translate(88, 96)">
    <rect class="accent" x="6" y="30" width="52" height="6" rx="3" />
    <ellipse class="accent" cx="32" cy="33" rx="7" ry="14" />
    <rect class="accent" x="30" y="14" width="4" height="12" rx="1.5" />
    <circle class="accent" cx="18" cy="36" r="3.5" />
    <circle class="accent" cx="46" cy="36" r="3.5" />
  </g>
  <text class="label" x="120" y="174">Plane (Front)</text>

  <!-- 8. Cloud -->
  <rect class="cell-frame" x="160" y="90" width="80" height="90" rx="6" />
  <g id="cloud" transform="translate(168, 96)">
    <path d="M 18 44 Q 6 44 6 32 Q 6 22 18 22 Q 22 12 32 12 Q 44 12 46 24 Q 58 24 58 34 Q 58 44 46 44 Z" />
  </g>
  <text class="label" x="200" y="174">Cloud</text>

  <!-- 9. Lightning -->
  <rect class="cell-frame" x="240" y="90" width="80" height="90" rx="6" />
  <g id="lightning" transform="translate(248, 96)">
    <polygon class="accent" points="34,6 16,34 28,34 24,58 48,28 34,28 40,6" />
  </g>
  <text class="label" x="280" y="174">Lightning</text>

  <!-- 10. Wind -->
  <rect class="cell-frame" x="320" y="90" width="80" height="90" rx="6" />
  <g id="wind" transform="translate(328, 96)">
    <path d="M 6 20 H 38 Q 46 20 46 14 Q 46 8 40 8" />
    <path d="M 6 32 H 48 Q 56 32 56 26 Q 56 20 50 20" />
    <path d="M 6 44 H 32 Q 40 44 40 50 Q 40 56 34 56" />
  </g>
  <text class="label" x="360" y="174">Wind</text>

  <!-- ============ Row 3 ============ -->

  <!-- 11. Throttle -->
  <rect class="cell-frame" x="0" y="180" width="80" height="90" rx="6" />
  <g id="throttle" transform="translate(8, 186)">
    <rect x="28" y="6" width="8" height="54" rx="4" />
    <line x1="32" y1="14" x2="32" y2="54" stroke-width="2" />
    <line x1="22" y1="14" x2="42" y2="14" stroke-width="1" stroke-dasharray="2 3" />
    <line x1="22" y1="32" x2="42" y2="32" stroke-width="1" stroke-dasharray="2 3" />
    <line x1="22" y1="50" x2="42" y2="50" stroke-width="1" stroke-dasharray="2 3" />
    <rect class="accent" x="20" y="20" width="24" height="10" rx="2" />
  </g>
  <text class="label" x="40" y="264">Throttle</text>

  <!-- 12. Joystick -->
  <rect class="cell-frame" x="80" y="180" width="80" height="90" rx="6" />
  <g id="joystick" transform="translate(88, 186)">
    <ellipse class="accent" cx="32" cy="54" rx="16" ry="4" />
    <line x1="32" y1="22" x2="32" y2="52" stroke-width="4" />
    <circle class="accent" cx="32" cy="16" r="8" />
  </g>
  <text class="label" x="120" y="264">Joystick</text>

  <!-- 13. Landing Gear -->
  <rect class="cell-frame" x="160" y="180" width="80" height="90" rx="6" />
  <g id="landing-gear" transform="translate(168, 186)">
    <line x1="22" y1="8" x2="42" y2="8" stroke-width="4" />
    <line x1="28" y1="10" x2="28" y2="36" />
    <line x1="36" y1="10" x2="36" y2="36" />
    <circle cx="32" cy="46" r="10" />
    <circle class="accent" cx="32" cy="46" r="3" />
  </g>
  <text class="label" x="200" y="264">Landing Gear</text>

  <!-- 14. Flap -->
  <rect class="cell-frame" x="240" y="180" width="80" height="90" rx="6" />
  <g id="flap" transform="translate(248, 186)">
    <path class="accent" d="M 6 24 L 50 24 L 56 30 L 6 30 Z" />
    <path class="accent" d="M 32 30 L 56 30 L 50 44 L 28 36 Z" opacity="0.55" />
    <line x1="32" y1="30" x2="50" y2="44" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>
  <text class="label" x="280" y="264">Flap</text>

  <!-- 15. Turbine -->
  <rect class="cell-frame" x="320" y="180" width="80" height="90" rx="6" />
  <g id="turbine" transform="translate(328, 186)">
    <circle cx="32" cy="32" r="22" />
    <g stroke-width="3.5">
      <line x1="32" y1="32" x2="32" y2="13" />
      <line x1="32" y1="32" x2="32" y2="51" />
      <line x1="32" y1="32" x2="13" y2="32" />
      <line x1="32" y1="32" x2="51" y2="32" />
      <line x1="32" y1="32" x2="18.6" y2="18.6" />
      <line x1="32" y1="32" x2="45.4" y2="45.4" />
      <line x1="32" y1="32" x2="18.6" y2="45.4" />
      <line x1="32" y1="32" x2="45.4" y2="18.6" />
    </g>
    <circle class="accent" cx="32" cy="32" r="4" />
  </g>
  <text class="label" x="360" y="264">Turbine</text>

  <!-- ============ Row 4 ============ -->

  <!-- 16. Brake -->
  <rect class="cell-frame" x="0" y="270" width="80" height="90" rx="6" />
  <g id="brake" transform="translate(8, 276)">
    <circle cx="32" cy="32" r="20" />
    <circle cx="32" cy="32" r="8" />
    <rect class="accent" x="10" y="27" width="10" height="10" rx="1.5" />
    <rect class="accent" x="44" y="27" width="10" height="10" rx="1.5" />
  </g>
  <text class="label" x="40" y="354">Brake</text>

  <!-- 17. Warning -->
  <rect class="cell-frame" x="80" y="270" width="80" height="90" rx="6" />
  <g id="warning" transform="translate(88, 276)">
    <path d="M 32 8 L 56 52 L 8 52 Z" />
    <line x1="32" y1="22" x2="32" y2="38" stroke-width="4" />
    <circle class="accent" cx="32" cy="46" r="2.5" />
  </g>
  <text class="label" x="120" y="354">Warning</text>

  <!-- 18. Control Tower -->
  <rect class="cell-frame" x="160" y="270" width="80" height="90" rx="6" />
  <g id="control-tower" transform="translate(168, 276)">
    <line x1="32" y1="6" x2="32" y2="12" />
    <circle class="accent" cx="32" cy="6" r="2" />
    <rect x="20" y="12" width="24" height="14" rx="2" />
    <line x1="22" y1="20" x2="42" y2="20" stroke-width="1.5" />
    <path d="M 24 26 L 24 52 L 14 56 L 50 56 L 40 52 L 40 26" />
  </g>
  <text class="label" x="200" y="354">Control Tower</text>

  <!-- 19. Runway -->
  <rect class="cell-frame" x="240" y="270" width="80" height="90" rx="6" />
  <g id="runway" transform="translate(248, 276)">
    <line x1="6" y1="16" x2="58" y2="16" />
    <path d="M 22 54 L 42 54 L 38 18 L 26 18 Z" />
    <line x1="32" y1="22" x2="32" y2="26" stroke-width="2" />
    <line x1="32" y1="32" x2="32" y2="38" stroke-width="2" />
    <line x1="32" y1="44" x2="32" y2="50" stroke-width="2" />
  </g>
  <text class="label" x="280" y="354">Runway</text>

  <!-- 20. Heading Indicator -->
  <rect class="cell-frame" x="320" y="270" width="80" height="90" rx="6" />
  <g id="heading-indicator" transform="translate(328, 276)">
    <circle cx="32" cy="32" r="22" />
    <line x1="32" y1="6" x2="32" y2="12" stroke-width="4" />
    <path class="accent" d="M 32 18 L 34 32 L 46 36 L 46 38 L 34 38 L 34 44 L 38 47 L 32 46 L 26 47 L 30 44 L 30 38 L 18 38 L 18 36 L 30 32 Z" />
  </g>
  <text class="label" x="360" y="354">Heading</text>

</svg>
