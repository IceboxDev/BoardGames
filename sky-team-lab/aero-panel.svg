<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round"
     font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
     color="#0f172a">

  <style>
    .cell-frame { fill: rgba(15, 23, 42, 0.04); stroke: rgba(15, 23, 42, 0.18); stroke-width: 0.75; }
    .label { fill: rgba(15, 23, 42, 0.55); stroke: none; font-size: 7.5px; text-anchor: middle; font-weight: 500; font-family: system-ui, sans-serif; }
    .accent { fill: currentColor; stroke: none; }
    .panel-text { fill: currentColor; stroke: none; font-weight: 800; }
    .panel-text-lit { fill: #fef3c7; stroke: none; font-weight: 800; }
  </style>

  <!-- ============ Row 1 ============ -->

  <!-- 1. Annunciator: lit STBY box -->
  <rect class="cell-frame" x="0" y="0" width="100" height="100" rx="6" />
  <g id="annunciator-lit" transform="translate(10, 8)">
    <rect x="6" y="22" width="68" height="24" rx="2" class="accent" />
    <text class="panel-text-lit" x="40" y="38" text-anchor="middle" font-size="11" letter-spacing="3">STBY</text>
    <line x1="6" y1="22" x2="74" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" />
  </g>
  <text class="label" x="50" y="94">Annunciator</text>

  <!-- 2. Caution/Warning chevrons -->
  <rect class="cell-frame" x="100" y="0" width="100" height="100" rx="6" />
  <g id="caution-stripes" transform="translate(110, 8)">
    <rect x="4" y="20" width="72" height="28" rx="1" stroke-width="1.5" />
    <g class="accent">
      <polygon points="4,48 24,20 36,20 16,48" />
      <polygon points="36,48 56,20 68,20 48,48" />
      <polygon points="68,48 76,40 76,48" />
    </g>
    <text class="panel-text" x="40" y="64" text-anchor="middle" font-size="8" letter-spacing="2">CAUTION</text>
  </g>
  <text class="label" x="150" y="94">Caution Stripes</text>

  <!-- 3. Three-position toggle ON/OFF/AUTO -->
  <rect class="cell-frame" x="200" y="0" width="100" height="100" rx="6" />
  <g id="toggle-3pos" transform="translate(210, 8)">
    <g class="panel-text" font-size="6.5" letter-spacing="1">
      <text x="6" y="20">ON</text>
      <text x="6" y="42">OFF</text>
      <text x="6" y="64">AUTO</text>
    </g>
    <rect x="40" y="12" width="22" height="56" rx="2" stroke-width="1.5" />
    <line x1="51" y1="40" x2="51" y2="16" stroke-width="3" />
    <circle class="accent" cx="51" cy="14" r="4.5" />
    <line x1="38" y1="40" x2="64" y2="40" stroke-width="0.75" />
  </g>
  <text class="label" x="250" y="94">3-Pos Toggle</text>

  <!-- 4. Rotary selector with positions -->
  <rect class="cell-frame" x="300" y="0" width="100" height="100" rx="6" />
  <g id="rotary-selector" transform="translate(310, 8)">
    <circle cx="40" cy="36" r="22" stroke-width="1.5" />
    <circle cx="40" cy="36" r="14" />
    <line x1="40" y1="36" x2="52" y2="24" stroke-width="3" />
    <circle class="accent" cx="40" cy="36" r="2.5" />
    <g class="panel-text" font-size="6" letter-spacing="0.5">
      <text x="40" y="12" text-anchor="middle">OFF</text>
      <text x="68" y="38" text-anchor="start">RUN</text>
      <text x="40" y="68" text-anchor="middle">TEST</text>
      <text x="12" y="38" text-anchor="end">STBY</text>
    </g>
  </g>
  <text class="label" x="350" y="94">Rotary Selector</text>

  <!-- 5. Press-to-test push button -->
  <rect class="cell-frame" x="400" y="0" width="100" height="100" rx="6" />
  <g id="press-button" transform="translate(410, 8)">
    <circle cx="40" cy="36" r="24" stroke-width="1.5" />
    <circle cx="40" cy="36" r="18" class="accent" opacity="0.85" />
    <circle cx="40" cy="36" r="18" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" fill="none" />
    <text class="panel-text-lit" x="40" y="33" text-anchor="middle" font-size="6" letter-spacing="0.5">PRESS</text>
    <text class="panel-text-lit" x="40" y="42" text-anchor="middle" font-size="6" letter-spacing="0.5">TO TEST</text>
  </g>
  <text class="label" x="450" y="94">Test Button</text>

  <!-- ============ Row 2 ============ -->

  <!-- 6. Round indicator light with label -->
  <rect class="cell-frame" x="0" y="100" width="100" height="100" rx="6" />
  <g id="indicator-light" transform="translate(10, 108)">
    <circle cx="22" cy="36" r="12" class="accent" />
    <circle cx="22" cy="36" r="12" stroke="rgba(15,23,42,0.3)" stroke-width="1" fill="none" />
    <circle cx="18" cy="32" r="3" fill="rgba(255,255,255,0.45)" stroke="none" />
    <line x1="40" y1="36" x2="48" y2="36" stroke-width="1" />
    <text class="panel-text" x="50" y="34" font-size="8">GEAR</text>
    <text class="panel-text" x="50" y="44" font-size="8" letter-spacing="1">DOWN</text>
  </g>
  <text class="label" x="50" y="194">Indicator Light</text>

  <!-- 7. LED bar (5-segment fuel/level gauge) -->
  <rect class="cell-frame" x="100" y="100" width="100" height="100" rx="6" />
  <g id="led-bar" transform="translate(110, 108)">
    <g>
      <rect class="accent" x="14" y="20" width="9" height="14" rx="1" />
      <rect class="accent" x="26" y="20" width="9" height="14" rx="1" />
      <rect class="accent" x="38" y="20" width="9" height="14" rx="1" opacity="0.65" />
      <rect x="50" y="20" width="9" height="14" rx="1" stroke-width="1" />
      <rect x="62" y="20" width="9" height="14" rx="1" stroke-width="1" />
    </g>
    <g class="panel-text" font-size="6">
      <text x="14" y="46">L</text>
      <text x="68" y="46">H</text>
      <text x="40" y="60" text-anchor="middle">FUEL FLOW</text>
    </g>
  </g>
  <text class="label" x="150" y="194">LED Bar</text>

  <!-- 8. Digital readout (e.g. VHF) -->
  <rect class="cell-frame" x="200" y="100" width="100" height="100" rx="6" />
  <g id="digital-readout" transform="translate(210, 108)">
    <rect x="6" y="18" width="68" height="32" rx="2" stroke-width="1.5" />
    <rect x="9" y="21" width="62" height="26" fill="#0f172a" stroke="none" opacity="0.85" />
    <text x="40" y="42" text-anchor="middle" font-size="18" font-weight="900" fill="#fef3c7" stroke="none" letter-spacing="2">118.5</text>
    <text class="panel-text" x="40" y="62" text-anchor="middle" font-size="6.5" letter-spacing="1.5">COM 1 MHz</text>
  </g>
  <text class="label" x="250" y="194">Digital Readout</text>

  <!-- 9. HUD Crosshair / Boresight -->
  <rect class="cell-frame" x="300" y="100" width="100" height="100" rx="6" />
  <g id="hud-crosshair" transform="translate(310, 108)">
    <circle cx="40" cy="36" r="3" />
    <line x1="40" y1="10" x2="40" y2="26" />
    <line x1="40" y1="46" x2="40" y2="62" />
    <line x1="14" y1="36" x2="30" y2="36" />
    <line x1="50" y1="36" x2="66" y2="36" />
    <line x1="20" y1="26" x2="26" y2="26" stroke-width="1.5" />
    <line x1="54" y1="26" x2="60" y2="26" stroke-width="1.5" />
    <line x1="20" y1="46" x2="26" y2="46" stroke-width="1.5" />
    <line x1="54" y1="46" x2="60" y2="46" stroke-width="1.5" />
  </g>
  <text class="label" x="350" y="194">HUD Crosshair</text>

  <!-- 10. Flight-path vector (HUD) -->
  <rect class="cell-frame" x="400" y="100" width="100" height="100" rx="6" />
  <g id="flight-vector" transform="translate(410, 108)">
    <circle cx="40" cy="36" r="8" />
    <line x1="40" y1="22" x2="40" y2="28" />
    <line x1="16" y1="36" x2="32" y2="36" stroke-width="3" />
    <line x1="48" y1="36" x2="64" y2="36" stroke-width="3" />
  </g>
  <text class="label" x="450" y="194">Flight Vector</text>

  <!-- ============ Row 3 ============ -->

  <!-- 11. Pitch ladder rung -->
  <rect class="cell-frame" x="0" y="200" width="100" height="100" rx="6" />
  <g id="pitch-rung" transform="translate(10, 208)">
    <line x1="8" y1="36" x2="26" y2="36" />
    <line x1="54" y1="36" x2="72" y2="36" />
    <line x1="26" y1="36" x2="26" y2="40" />
    <line x1="54" y1="36" x2="54" y2="40" />
    <text class="panel-text" x="40" y="22" text-anchor="middle" font-size="11">-10</text>
    <line x1="14" y1="48" x2="24" y2="48" stroke-dasharray="2 2" stroke-width="1.5" />
    <line x1="56" y1="48" x2="66" y2="48" stroke-dasharray="2 2" stroke-width="1.5" />
  </g>
  <text class="label" x="50" y="294">Pitch Ladder</text>

  <!-- 12. Heading tape -->
  <rect class="cell-frame" x="100" y="200" width="100" height="100" rx="6" />
  <g id="heading-tape" transform="translate(110, 208)">
    <line x1="6" y1="40" x2="74" y2="40" stroke-width="1.5" />
    <g stroke-width="1.5">
      <line x1="14" y1="40" x2="14" y2="46" />
      <line x1="26" y1="40" x2="26" y2="46" />
      <line x1="40" y1="40" x2="40" y2="48" />
      <line x1="54" y1="40" x2="54" y2="46" />
      <line x1="66" y1="40" x2="66" y2="46" />
    </g>
    <g class="panel-text" font-size="7" text-anchor="middle">
      <text x="14" y="58">W</text>
      <text x="26" y="58">33</text>
      <text x="40" y="58">N</text>
      <text x="54" y="58">03</text>
      <text x="66" y="58">E</text>
    </g>
    <polygon class="accent" points="40,28 36,36 44,36" />
  </g>
  <text class="label" x="150" y="294">Heading Tape</text>

  <!-- 13. Vertical speed/alt tape -->
  <rect class="cell-frame" x="200" y="200" width="100" height="100" rx="6" />
  <g id="vert-tape" transform="translate(210, 208)">
    <line x1="40" y1="6" x2="40" y2="68" stroke-width="1.5" />
    <g stroke-width="1.5">
      <line x1="40" y1="12" x2="46" y2="12" />
      <line x1="40" y1="22" x2="46" y2="22" />
      <line x1="40" y1="32" x2="50" y2="32" />
      <line x1="40" y1="42" x2="46" y2="42" />
      <line x1="40" y1="52" x2="46" y2="52" />
      <line x1="40" y1="62" x2="46" y2="62" />
    </g>
    <g class="panel-text" font-size="6" text-anchor="end">
      <text x="36" y="14">120</text>
      <text x="36" y="24">110</text>
      <text x="36" y="34" font-size="8">100</text>
      <text x="36" y="44">90</text>
      <text x="36" y="54">80</text>
      <text x="36" y="64">70</text>
    </g>
    <polygon class="accent" points="54,32 62,28 62,36" />
  </g>
  <text class="label" x="250" y="294">Speed Tape</text>

  <!-- 14. Wire trace with junction -->
  <rect class="cell-frame" x="300" y="200" width="100" height="100" rx="6" />
  <g id="wire-trace" transform="translate(310, 208)">
    <path d="M 6 14 L 28 14 L 28 38 L 56 38 L 56 62 L 74 62" stroke-width="2" />
    <circle class="accent" cx="28" cy="38" r="3" />
    <circle class="accent" cx="56" cy="38" r="3" />
    <rect x="2" y="11" width="6" height="6" stroke-width="1.5" />
    <rect x="70" y="59" width="6" height="6" stroke-width="1.5" />
    <text class="panel-text" x="40" y="78" text-anchor="middle" font-size="6">BUS A → BUS B</text>
  </g>
  <text class="label" x="350" y="294">Wire Trace</text>

  <!-- 15. D-sub multi-pin connector -->
  <rect class="cell-frame" x="400" y="200" width="100" height="100" rx="6" />
  <g id="dsub-connector" transform="translate(410, 208)">
    <path d="M 6 14 H 74 V 44 H 6 Z M 6 44 L 12 56 H 68 L 74 44" stroke-width="1.5" />
    <g class="accent">
      <circle cx="14" cy="22" r="1.6" /><circle cx="22" cy="22" r="1.6" /><circle cx="30" cy="22" r="1.6" />
      <circle cx="38" cy="22" r="1.6" /><circle cx="46" cy="22" r="1.6" /><circle cx="54" cy="22" r="1.6" />
      <circle cx="62" cy="22" r="1.6" /><circle cx="70" cy="22" r="1.6" />
      <circle cx="18" cy="32" r="1.6" /><circle cx="26" cy="32" r="1.6" /><circle cx="34" cy="32" r="1.6" />
      <circle cx="42" cy="32" r="1.6" /><circle cx="50" cy="32" r="1.6" /><circle cx="58" cy="32" r="1.6" />
      <circle cx="66" cy="32" r="1.6" />
    </g>
    <text class="panel-text" x="40" y="72" text-anchor="middle" font-size="6" letter-spacing="1">DB-15 P1</text>
  </g>
  <text class="label" x="450" y="294">Connector</text>

  <!-- ============ Row 4 ============ -->

  <!-- 16. Engraved data plate -->
  <rect class="cell-frame" x="0" y="300" width="100" height="100" rx="6" />
  <g id="data-plate" transform="translate(10, 308)">
    <rect x="6" y="14" width="68" height="40" rx="1" stroke-width="1.5" />
    <circle class="accent" cx="11" cy="19" r="1.5" />
    <circle class="accent" cx="69" cy="19" r="1.5" />
    <circle class="accent" cx="11" cy="49" r="1.5" />
    <circle class="accent" cx="69" cy="49" r="1.5" />
    <line x1="6" y1="26" x2="74" y2="26" stroke-width="0.75" />
    <text class="panel-text" x="40" y="24" text-anchor="middle" font-size="7" letter-spacing="2">MAIN BUS</text>
    <text class="panel-text" x="40" y="38" text-anchor="middle" font-size="9" letter-spacing="1">28 V DC</text>
    <text class="panel-text" x="40" y="48" text-anchor="middle" font-size="5.5" letter-spacing="0.5">P/N 4471-002</text>
  </g>
  <text class="label" x="50" y="394">Data Plate</text>

  <!-- 17. Phillips screw -->
  <rect class="cell-frame" x="100" y="300" width="100" height="100" rx="6" />
  <g id="screw" transform="translate(110, 308)">
    <circle cx="40" cy="36" r="18" stroke-width="1.5" />
    <circle cx="40" cy="36" r="12" stroke="rgba(15,23,42,0.3)" stroke-width="0.5" />
    <line x1="28" y1="24" x2="52" y2="48" stroke-width="3" />
    <line x1="28" y1="48" x2="52" y2="24" stroke-width="3" />
    <text class="panel-text" x="40" y="68" text-anchor="middle" font-size="6">M4 × 12</text>
  </g>
  <text class="label" x="150" y="394">Mounting Screw</text>

  <!-- 18. Section divider w/ label -->
  <rect class="cell-frame" x="200" y="300" width="100" height="100" rx="6" />
  <g id="section-divider" transform="translate(210, 308)">
    <line x1="4" y1="36" x2="20" y2="36" stroke-width="1.5" />
    <line x1="60" y1="36" x2="76" y2="36" stroke-width="1.5" />
    <line x1="4" y1="36" x2="4" y2="32" stroke-width="1.5" />
    <line x1="76" y1="36" x2="76" y2="32" stroke-width="1.5" />
    <text class="panel-text" x="40" y="40" text-anchor="middle" font-size="9" letter-spacing="3">ENG · COM</text>
    <text class="panel-text" x="40" y="58" text-anchor="middle" font-size="6" letter-spacing="2" fill="rgba(15,23,42,0.55)">SECTION 3 / 5</text>
  </g>
  <text class="label" x="250" y="394">Section Label</text>

  <!-- 19. Frequency / channel selector -->
  <rect class="cell-frame" x="300" y="300" width="100" height="100" rx="6" />
  <g id="freq-selector" transform="translate(310, 308)">
    <rect x="4" y="14" width="72" height="20" rx="2" stroke-width="1.5" fill="#0f172a" fill-opacity="0.85" />
    <text x="40" y="29" text-anchor="middle" font-size="13" font-weight="900" fill="#fef3c7" stroke="none" letter-spacing="3">VOR 1</text>
    <line x1="14" y1="44" x2="14" y2="50" stroke-width="1.5" />
    <line x1="26" y1="44" x2="26" y2="50" stroke-width="1.5" />
    <line x1="40" y1="44" x2="40" y2="52" stroke-width="2" />
    <line x1="54" y1="44" x2="54" y2="50" stroke-width="1.5" />
    <line x1="66" y1="44" x2="66" y2="50" stroke-width="1.5" />
    <text class="panel-text" x="14" y="62" text-anchor="middle" font-size="6">108</text>
    <text class="panel-text" x="40" y="62" text-anchor="middle" font-size="7">115</text>
    <text class="panel-text" x="66" y="62" text-anchor="middle" font-size="6">118</text>
  </g>
  <text class="label" x="350" y="394">Freq Selector</text>

  <!-- 20. Schematic — switch + resistor + ground -->
  <rect class="cell-frame" x="400" y="300" width="100" height="100" rx="6" />
  <g id="schematic-bit" transform="translate(410, 308)">
    <!-- Wire in -->
    <line x1="4" y1="22" x2="18" y2="22" stroke-width="1.5" />
    <!-- Switch (open) -->
    <line x1="18" y1="22" x2="30" y2="14" stroke-width="1.5" />
    <circle class="accent" cx="18" cy="22" r="1.5" />
    <circle class="accent" cx="32" cy="22" r="1.5" />
    <!-- Wire to resistor -->
    <line x1="32" y1="22" x2="42" y2="22" stroke-width="1.5" />
    <!-- Resistor (zigzag) -->
    <polyline points="42,22 44,18 48,26 52,18 56,26 60,18 62,22" stroke-width="1.5" />
    <!-- Down to ground -->
    <line x1="62" y1="22" x2="70" y2="22" stroke-width="1.5" />
    <line x1="70" y1="22" x2="70" y2="44" stroke-width="1.5" />
    <!-- Ground symbol -->
    <line x1="62" y1="44" x2="78" y2="44" stroke-width="1.5" />
    <line x1="65" y1="48" x2="75" y2="48" stroke-width="1.5" />
    <line x1="68" y1="52" x2="72" y2="52" stroke-width="1.5" />
    <text class="panel-text" x="40" y="72" text-anchor="middle" font-size="6">S1 → R3 → GND</text>
  </g>
  <text class="label" x="450" y="394">Schematic</text>

</svg>
