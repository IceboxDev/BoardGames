<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Team — Board Lab</title>
  <link rel="stylesheet" href="board.css" />
</head>
<body>
  <!-- ============================================================
       Sky Team cockpit board — iteration playground.
       Zero coupling to the React app. Edit board.css, refresh.
       ============================================================ -->
  <main class="board" aria-label="Sky Team cockpit">

    <!-- Outer cockpit outline. SVG path traced 4 units OUTSIDE the cabin
         polygon so the stroke isn't hidden behind the cabin (cabin is
         z=3, this is z=0). 720×1000 board viewBox.
         Cabin perimeter offsets:
           thin section top  y=882.5 → 878.5  (up 4)
           cabin right edge  x=583.2 → 587.2  (right 4)
           slope             offset (3.56, -1.82) perpendicular up-right
           convex miter at cabin's top-right: (587.2, 878.5)
           concave (offset slope ∩ offset thin top): (91.05, 878.5)
           offset slope ∩ play-area's left edge x=86.4 at (86.4, 869.46)
         Play-area inset: x=86.4/633.6, y=100/970. 8px rounded corners
         at top-L / top-R / bottom-R; sharp angles trace the offset
         cabin perimeter. -->
    <svg class="play-area" viewBox="0 0 720 1000" preserveAspectRatio="none" aria-hidden="true">
      <path d="M 94.4 100 L 625.6 100 Q 633.6 100 633.6 108 L 633.6 962 Q 633.6 970 625.6 970 L 587.2 970 L 587.2 878.5 L 91.05 878.5 L 86.4 869.46 L 86.4 108 Q 86.4 100 94.4 100 Z" />
    </svg>

    <!-- Central seam mirror line lives in .board::after; nothing to put here. -->

    <!-- ========== top HUD ========== -->
    <header class="top-hud" aria-label="Cockpit HUD">
      <button class="reroll" type="button" aria-label="Reroll token">
        <span class="reroll__glyph">↻</span>
      </button>
      <div class="hud weather" aria-label="Weather + dice forecast">
        <span class="weather__icons">☁ ☁</span>
        <span class="weather__dice">⚂ ⚂</span>
      </div>
      <div class="hud altitude" aria-label="Altitude readout">
        <span class="altitude__value">6000</span>
      </div>
    </header>

    <!-- ========== left side strip — pilot (landing gear) ========== -->
    <aside class="strip strip-left" aria-label="Pilot landing gear">
      <ol class="strip__stack">
        <!-- Top spacer row: pushes the 3 visible tiles down so they live in
             the lower half of the strip. Same spacer exists on the right
             strip so L1-L3 stay aligned with R1-R3. -->
        <li class="strip__filler" aria-hidden="true"></li>
        <li class="control">
          <span class="tile tile--pilot">1<small>/</small>2</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
        <li class="control">
          <span class="tile tile--pilot">3<small>/</small>4</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
        <li class="control">
          <span class="tile tile--pilot">5<small>/</small>6</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
        <!-- Empty bottom row: aligns the empty L4 slot with R4; the cabin
             panel's tall left section covers this area visually. -->
        <li class="strip__filler" aria-hidden="true"></li>
      </ol>
    </aside>

    <!-- ========== right side strip — copilot (flaps) ========== -->
    <aside class="strip strip-right" aria-label="Copilot flaps">
      <ol class="strip__stack">
        <!-- Top spacer row, mirrors the left strip. Pushes R1-R4 downward
             so the column lives in the lower portion of the strip area. -->
        <li class="strip__filler" aria-hidden="true"></li>
        <li class="control">
          <span class="tile tile--copilot">1<small>/</small>2</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
        <li class="control">
          <span class="tile tile--copilot">2<small>/</small>3</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
        <li class="control">
          <span class="tile tile--copilot">3<small>/</small>4</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
        <li class="control">
          <span class="tile tile--copilot">5<small>/</small>6</span>
          <span class="slider" aria-hidden="true"></span>
        </li>
      </ol>
    </aside>

    <!-- ========== center instrument cluster ========== -->
    <section class="center" aria-label="Instrument cluster">

      <!-- artificial horizon -->
      <div class="horizon" aria-label="Artificial horizon">
        <div class="horizon__bezel"></div>
        <div class="horizon__face">
          <div class="horizon__pitch-ladder"></div>
          <div class="horizon__plane" aria-hidden="true"></div>
        </div>
      </div>

      <!-- axis arc 2..12 — now elliptical (rx=232, ry=85: rx≈2.7× ry) so
           the chord ends sit much further apart horizontally without
           making the arc proportionally deeper. ViewBox widened
           400→500 to fit the longer chord; the CSS pushes the element
           110% of .center wide (overflowing 5% each side into the
           strips) so the chord renders ~25% wider on screen than before.
           Chord (18,18)→(482,18) = 464 viewBox units. Midpoint (250,103). -->
      <svg class="axis-arc" viewBox="0 0 500 200" aria-label="Axis track 2 through 12">
        <defs>
          <path id="axisArcPath" d="M 18 18 A 232 85 0 0 0 482 18" fill="none" />
        </defs>
        <use href="#axisArcPath" class="axis-arc__band" />
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="2%">2</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="11.5%">3</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="21%">4</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="32%">5</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="42%">6</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="50%">7</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="58%">8</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="68%">9</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="78%">10</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="88.5%">11</textPath>
        </text>
        <text class="axis-arc__num">
          <textPath href="#axisArcPath" startOffset="98%">12</textPath>
        </text>
      </svg>

      <!-- Engine row: just the two engine tiles flanking the axis marker.
           No sliders — engine tiles are placement targets only. -->
      <div class="engine-row" aria-label="Engines">
        <span class="tile tile--pilot tile--engine" aria-label="Pilot engine"></span>
        <div class="axis-marker" aria-hidden="true">+</div>
        <span class="tile tile--copilot tile--engine" aria-label="Copilot engine"></span>
      </div>

      <!-- brake threshold arc 2..6 -->
      <svg class="brake-arc" viewBox="0 0 320 130" aria-label="Brake threshold 2 through 6">
        <defs>
          <path id="brakeArcPath" d="M 36 28 Q 160 130 284 28" fill="none" />
        </defs>
        <use href="#brakeArcPath" class="brake-arc__band" />
        <text class="brake-arc__num">
          <textPath href="#brakeArcPath" startOffset="6%">2</textPath>
        </text>
        <text class="brake-arc__num">
          <textPath href="#brakeArcPath" startOffset="28%">3</textPath>
        </text>
        <text class="brake-arc__num">
          <textPath href="#brakeArcPath" startOffset="50%">4</textPath>
        </text>
        <text class="brake-arc__num">
          <textPath href="#brakeArcPath" startOffset="72%">5</textPath>
        </text>
        <text class="brake-arc__num">
          <textPath href="#brakeArcPath" startOffset="94%">6</textPath>
        </text>
      </svg>

      <!-- 2/4/6 brake action row -->
      <div class="brake-row" aria-label="Brake actions">
        <div class="control">
          <span class="tile tile--pilot">2</span>
          <span class="slider" aria-hidden="true"></span>
        </div>
        <div class="control">
          <span class="tile tile--pilot">4</span>
          <span class="slider" aria-hidden="true"></span>
        </div>
        <div class="control">
          <span class="tile tile--pilot">6</span>
          <span class="slider" aria-hidden="true"></span>
        </div>
      </div>
    </section>

    <!-- ========== cabin panel (bottom-left + center) ==========
         One continuous mixed-color panel running from the left edge across to
         just before the right strip. Houses the 3 coffee mugs (right-triangle
         2+1) on the left and the 3 concentration tiles in the middle. The
         4th flap tile (R4) sits OUTSIDE this panel, in the right strip. -->
    <aside class="cabin-panel" aria-label="Cabin">
      <div class="cabin-panel__mugs">
        <!-- Right-triangle 1+2: one mug on the top row, two on the bottom.
             The vertical column on the left is the right-angle side, the
             single 3rd mug to the right of the bottom-left mug closes the
             triangle. -->
        <div class="mug-block__row">
          <span class="mug">+1</span>
        </div>
        <div class="mug-block__row">
          <span class="mug">+1</span>
          <span class="mug">+1</span>
        </div>
      </div>
      <!-- Concentration tiles: each houses the coffee-icon.svg path (moved
           into this folder from ~/Downloads). The fill is split exactly down
           the centre via a linearGradient with two stops at offset=50% →
           left half --pilot-ink (neon), right half --copilot-ink (gold). -->
      <div class="concentration-row" aria-label="Concentration slots">
        <span class="tile tile--mixed" aria-label="Concentration">
          <svg viewBox="0 0 96.59 122.88" aria-hidden="true">

                <stop offset="50%" stop-color="#ffd83a" />
              </linearGradient>

          </svg>
        </span>

          <svg viewBox="0 0 96.59 122.88" aria-hidden="true">

                <stop offset="50%" stop-color="#8df0d0" />
                <stop offset="50%" stop-color="#ffd83a" />
